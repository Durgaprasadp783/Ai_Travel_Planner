version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mongodb_travel_planner
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: redis_travel_planner
    ports:
      - "6379:6379"

  # Backend API
  backend:
    build: ./backend
    container_name: backend_travel_planner
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_travel_planner
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - JWT_SECRET=your_super_secret_jwt_key
      # Add your API keys below or in a root .env file
      # - GEMINI_API_KEY=your_key
      # - GOOGLE_MAPS_API_KEY=your_key
      # - WEATHER_API_KEY=your_key
    depends_on:
      - mongodb
      - redis

  # Frontend Application
  frontend:
    build: ./frontend
    container_name: frontend_travel_planner
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
